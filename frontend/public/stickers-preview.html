<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>大龙虾表情包 - 25 款预览</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e5e7eb;
      min-height: 100vh;
    }
    h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .sticker-card {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 0.75rem;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .sticker-card .label {
      font-size: 0.7rem;
      margin-top: 0.5rem;
      opacity: 0.9;
      line-height: 1.3;
    }
    .sticker-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sticker-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }
  </style>
</head>
<body>
  <h1>🦞 大龙虾表情包 · 25 款</h1>
  <div class="grid" id="grid"></div>

  <script>
    const ACTIONS = [
      '叉腰', '僵住', '发抖', '慢慢放下', '立正', '翻白眼', '气得转圈', '钳子敲自己脑袋',
      '突然瘫倒装死', '最后弹起来比个耶', '原地蹦迪', '用钳子打节拍', '突然定格耍帅', '假装擦汗',
      '最后给你抛个媚眼', '抱头蹲防', '偷偷瞄你', '突然亮出"加钱"牌子', '原地后空翻（失败）', '躺平摆烂',
      '用钳子比心', '突然害羞捂脸', '原地蒸发', '从屏幕外爬回来', '最后……关机黑屏'
    ];

    const STICKER_FILES = [
      'lobster-sticker-01-chayao.png',
      'lobster-sticker-02-jiangzhu.png',
      'lobster-sticker-03-fadou.png',
      'lobster-sticker-04-manmanfangxia.png',
      'lobster-sticker-05-lizheng.png',
      'lobster-sticker-06-fanbaiyan.png',
      'lobster-sticker-07-qidezhuanquan.png',
      'lobster-sticker-08-qiaonao.png',
      'lobster-sticker-09-tandao.png',
      'lobster-sticker-10-bige-ye.png',
      'lobster-sticker-11-bengdi.png',
      'lobster-sticker-12-dajiepai.png',
      'lobster-sticker-13-shuaishuai.png',
      'lobster-sticker-14-cahan.png',
      'lobster-sticker-15-meiyan.png',
      'lobster-sticker-16-dunfang.png',
      'lobster-sticker-17-toutoumiaoni.png',
      'lobster-sticker-18-jiaqian.png',
      'lobster-sticker-19-houkongfan.png',
      'lobster-sticker-20-tangping.png',
      'lobster-sticker-21-bixin.png',
      'lobster-sticker-22-wulian.png',
      'lobster-sticker-23-zhengfa.png',
      'lobster-sticker-24-pahuilai.png',
      'lobster-sticker-25-guangji.png'
    ];

    const baseUrl = '/assets/stickers/';
    const grid = document.getElementById('grid');
    ACTIONS.forEach((label, i) => {
      const id = i + 1;
      const card = document.createElement('div');
      card.className = 'sticker-card';
      const src = baseUrl + STICKER_FILES[i];
      card.innerHTML = `
        <div class="sticker-wrap">
          <img src="${src}" alt="${label}" />
        </div>
        <div class="label">${id}. ${label}</div>
      `;
      grid.appendChild(card);
    });
  </script>
</body>
</html>
